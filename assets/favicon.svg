<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo -->
  <rect width="100" height="100" fill="#2C2218" rx="20"/>
  
  <!-- Tierra (forma ondulada inferior) -->
  <path d="M 15 65 Q 25 60 35 65 Q 45 70 55 65 Q 65 60 75 65 Q 85 70 95 65 L 95 95 L 5 95 Z" fill="#5C3D2E"/>
  
  <!-- Tierra más clara (relieve) -->
  <path d="M 15 70 Q 25 66 35 70 Q 45 74 55 70 Q 65 66 75 70 Q 85 74 95 70 L 95 95 L 5 95 Z" fill="#8B5E52" opacity="0.6"/>
  
  <!-- Raíces (líneas finas) -->
  <line x1="50" y1="70" x2="40" y2="85" stroke="#D4A574" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="70" x2="60" y2="85" stroke="#D4A574" stroke-width="1.5" opacity="0.7"/>
  <line x1="50" y1="70" x2="50" y2="88" stroke="#D4A574" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Brote/Planta (tallo) -->
  <line x1="50" y1="65" x2="50" y2="30" stroke="#4A7C5C" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Hojas del brote -->
  <g transform="translate(50, 35)">
    <!-- Hoja izquierda -->
    <path d="M 0 0 Q -8 -5 -10 -15" stroke="#6BA876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Hoja derecha -->
    <path d="M 0 0 Q 8 -5 10 -15" stroke="#6BA876" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Hoja arriba -->
    <ellipse cx="0" cy="-18" rx="3" ry="6" fill="#6BA876" opacity="0.8"/>
  </g>
  
  <!-- Brote superior (esperanza) -->
  <circle cx="50" cy="25" r="4" fill="#D4A574"/>
  
  <!-- Luz/esperanza (círculo radiante sutil) -->
  <circle cx="50" cy="25" r="7" fill="none" stroke="#D4A574" stroke-width="0.8" opacity="0.4"/>
  
  <!-- Detalles decorativos pequeños (gotas de agua/lluvia) -->
  <circle cx="35" cy="20" r="1.5" fill="#D4A574" opacity="0.5"/>
  <circle cx="65" cy="18" r="1.5" fill="#D4A574" opacity="0.5"/>
</svg>
